<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#0f172a"/>

  <!-- Circuit/chip icon -->
  <rect x="60" y="60" width="80" height="80" rx="8" fill="none" stroke="#3b82f6" stroke-width="4"/>
  <rect x="75" y="75" width="50" height="50" rx="4" fill="#1e40af"/>

  <!-- Chip pins left -->
  <line x1="40" y1="82" x2="60" y2="82" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="100" x2="60" y2="100" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="118" x2="60" y2="118" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

  <!-- Chip pins right -->
  <line x1="140" y1="82" x2="160" y2="82" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="100" x2="160" y2="100" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="118" x2="160" y2="118" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

  <!-- Chip pins top -->
  <line x1="82" y1="40" x2="82" y2="60" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="40" x2="100" y2="60" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="40" x2="118" y2="60" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

  <!-- Chip pins bottom -->
  <line x1="82" y1="140" x2="82" y2="160" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="140" x2="100" y2="160" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="140" x2="118" y2="160" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

  <!-- T letter in center -->
  <text x="100" y="113" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">T</text>
</svg>
