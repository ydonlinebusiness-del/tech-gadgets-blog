name: Generate Blog Article

on:
  schedule:
    - cron: '0 7 * * 1,3,5'  # Mo/Mi/Fr 09:00 CET (07:00 UTC)
  workflow_dispatch:           # Auch manuell auslösbar über GitHub UI

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT=$(cat .github/prompts/generate-article.md)
          claude --print "$PROMPT" --dangerously-skip-permissions

      - name: Commit and push new article
        run: |
          git config user.name "TechPickr Bot"
          git config user.email "bot@techpickr.com"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "No new article generated, skipping commit"
          else
            COMMIT_DATE=$(date +%Y-%m-%d)
            git commit -m "feat: auto-generated article $COMMIT_DATE"
            git push
          fi
